  location: "Berlin, Germany"
  url: "https://kandddinsky.de/workshop/collaborative_modelling_masterclass_magnorsky_2026"
  description: "Collaboration matters in design, opening up the process often causes projects to grind to a halt. This two-day hands-on intensive workshops is for technical leaders and practitioners who need aligned systems, not merely aligned opinions. In this workshop, you’ll learn efficient collaborative modelling using Bytesize Architecture Sessions combined with strategic Domain-Driven Design tools, and you’ll gain the judgement to discern when to work collaboratively and when to work solo."

